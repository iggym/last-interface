<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last Interface — The Wire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0a08;
    --bg-raised:#141110;
    --paper:#e8e2d5;
    --muted:#78716a;
    --amber:#ffb020;
    --amber-dim:#6b5230;
    --cold:#6fd3c7;
    --rule: rgba(232,226,213,0.09);
    --rule-strong: rgba(232,226,213,0.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    min-height:100vh;
    position:relative;
    -webkit-font-smoothing:antialiased;
  }

  /* ambient scanline + vignette, static — no node network, restraint */
  body::before{
    content:'';
    position:fixed; inset:0;
    background:
      repeating-linear-gradient(180deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px),
      radial-gradient(ellipse at 50% -10%, rgba(255,176,32,0.06), transparent 55%);
    pointer-events:none;
    z-index:0;
  }

  a{color:inherit;}
  :focus-visible{outline:2px solid var(--cold); outline-offset:3px;}

  .wrap{
    position:relative; z-index:1;
    max-width:760px;
    margin:0 auto;
    padding:4rem 1.5rem 6rem;
  }

  /* ---- masthead ---- */
  .mast{margin-bottom:3rem;}
  .signal-row{
    display:flex; align-items:center; gap:.6rem;
    font-size:.7rem; letter-spacing:.14em; text-transform:uppercase;
    color:var(--amber); margin-bottom:1.6rem;
  }
  .live-dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 8px var(--amber);
    animation:pulse 2.2s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes pulse{
    0%,100%{opacity:1; transform:scale(1);}
    50%{opacity:.35; transform:scale(.7);}
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:clamp(1.9rem, 5vw, 2.75rem);
    letter-spacing:-0.02em;
    color:var(--paper);
    margin-bottom:.9rem;
  }
  h1 .rule-name{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-weight:400;
    font-size:.85rem;
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:.55rem;
  }
  .mast p{
    color:var(--muted);
    font-size:.92rem;
    line-height:1.7;
    max-width:56ch;
  }

  /* ---- console: scan + channels ---- */
  .console{
    margin-bottom:2.4rem;
    border-top:1px solid var(--rule);
    border-bottom:1px solid var(--rule);
    padding:1.1rem 0;
  }
  .scan-line{
    display:flex; align-items:center; gap:.6rem;
    margin-bottom:.85rem;
  }
  .scan-line .caret{color:var(--cold); font-weight:600;}
  #search{
    flex:1;
    background:transparent;
    border:none;
    color:var(--paper);
    font-family:inherit;
    font-size:.9rem;
    outline:none;
    caret-color:var(--cold);
  }
  #search::placeholder{color:var(--muted);}

  .channels{
    display:flex; flex-wrap:wrap; gap:0 1rem;
    font-size:.72rem; letter-spacing:.08em; text-transform:uppercase;
  }
  .chan-btn{
    background:none; border:none; cursor:pointer;
    color:var(--muted);
    font-family:inherit; font-size:inherit; letter-spacing:inherit;
    padding:.15rem 0;
    position:relative;
  }
  .chan-btn::after{
    content:'';
    position:absolute; left:0; right:0; bottom:-2px;
    height:1px; background:var(--cold);
    transform:scaleX(0); transform-origin:left;
    transition:transform .2s ease;
  }
  .chan-btn:hover{color:var(--paper);}
  .chan-btn.active{color:var(--cold);}
  .chan-btn.active::after{transform:scaleX(1);}

  /* ---- the wire (feed) ---- */
  .wire{position:relative;}
  .wire::before{
    /* signal rail */
    content:'';
    position:absolute; left:-1.4rem; top:0; bottom:0; width:1px;
    background:linear-gradient(180deg, var(--rule-strong), transparent 96%);
    display:none;
  }
  @media(min-width:600px){ .wire::before{display:block;} }

  .entry{
    border-bottom:1px solid var(--rule);
    padding:1.15rem 0;
  }
  .entry:first-child{padding-top:0;}

  .entry-head{
    display:flex; align-items:baseline; gap:.85rem;
    cursor:pointer;
    background:none; border:none; width:100%; text-align:left;
    color:inherit; font-family:inherit;
    padding:0;
  }
  .idx{
    font-size:.72rem; color:var(--muted);
    width:1.6rem; flex-shrink:0;
  }
  .marker{
    width:5px;height:5px;border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 6px var(--amber);
    flex-shrink:0;
    transition:all .3s ease;
  }
  .entry.read .marker{
    background:var(--amber-dim);
    box-shadow:none;
  }
  .headline{
    font-size:1rem;
    line-height:1.45;
    color:var(--paper);
    flex:1;
    transition:color .2s ease;
  }
  .entry.read .headline{color:#b8b2a5;}
  .entry-head:hover .headline{color:var(--amber);}
  .date-stamp{
    font-size:.68rem; color:var(--muted);
    flex-shrink:0; white-space:nowrap;
    padding-top:.15rem;
  }

  .entry-body{
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease, opacity .3s ease, margin .3s ease;
    opacity:0;
    margin-left:2.45rem;
  }
  .entry.open .entry-body{
    max-height:14rem;
    opacity:1;
    margin-top:.75rem;
  }
  .summary{
    color:#c9c3b6;
    font-size:.88rem;
    line-height:1.7;
    max-width:58ch;
  }
  .entry-footer{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:.9rem;
    flex-wrap:wrap; gap:.7rem;
  }
  .tags-row{
    display:flex; gap:.7rem; flex-wrap:wrap;
    font-size:.68rem; letter-spacing:.06em; text-transform:uppercase;
    color:var(--muted);
  }
  .tags-row span:not(:last-child)::after{content:'·'; margin-left:.7rem; color:var(--rule-strong);}
  .run-link{
    font-size:.75rem; font-weight:500;
    color:var(--cold);
    text-decoration:none;
    letter-spacing:.04em;
    display:inline-flex; align-items:center; gap:.3rem;
    padding:.3rem .1rem;
  }
  .run-link:hover{text-decoration:underline;}
  .pinned-tag{
    font-size:.65rem; letter-spacing:.1em; text-transform:uppercase;
    color:var(--amber);
  }

  .empty-state{
    padding:2.5rem 0; color:var(--muted); font-size:.88rem; text-align:center;
  }

  footer{
    position:relative; z-index:1;
    text-align:center;
    color:var(--muted);
    font-size:.72rem;
    padding:2.5rem 1.5rem;
    letter-spacing:.04em;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="mast">
    <div class="signal-row"><span class="live-dot"></span> Signal live — 6 transmissions</div>
    <h1><span class="rule-name">The Last Interface</span>The Wire</h1>
    <p>Control, permission, and autonomy in future software — read as it comes in, not filed into a grid. Pin a line to read it. Run it to go deeper.</p>
  </header>

  <div class="console">
    <div class="scan-line">
      <span class="caret">›</span>
      <input type="text" id="search" placeholder="scan the wire…" autocomplete="off">
    </div>
    <div class="channels" id="channels">
      <button class="chan-btn active" data-tag="ALL">All</button>
    </div>
  </div>

  <div class="wire" id="wire"></div>
</div>

<footer>The Last Interface · The Wire · single-file, no build step</footer>

<script>
const DEFAULT_ARTICLES = [
  { id:"05-no-attention", title:"Only thing that does not need your attention.", summary:"The best agent you'll use this year won't ask for your attention.", tags:["Security","Governance","Interactive"], date:"2026-07-21", file:"articles/no-attention.html" },
  { id:"06-building-guardrails", title:"Everyone's building agents. Most never leave the hangar.", summary:"Six live instruments for reading where AI agents actually stand right now — not the pitch deck version. Every dial below is calibrated to a real 2026 dataset.", tags:["Security","Governance","Interactive"], date:"2026-07-21", file:"articles/building-guardrails.html" },
  { id:"01-permission-guardrails", title:"Autonomous Permission Guardrails", summary:"How human-in-the-loop OAuth scopes and Governance-as-Code prevent rogue agentic API loops while maintaining execution speed.", tags:["Security","Governance","Interactive"], date:"2026-07-21", file:"articles/01-permission-guardrails.html" },
  { id:"02-federated-agent-swarms", title:"The Swarm Architecture", summary:"Moving past single 'God Models' toward specialized multi-agent networks that collaborate on zero-copy data layers.", tags:["Architecture","Multi-Agent","Canvas"], date:"2026-07-18", file:"articles/02-federated-agent-swarms.html" },
  { id:"03-zero-copy-context", title:"Zero-Copy Data Access", summary:"Why future software won't import your databases—agents will query system data in-place without moving a single byte.", tags:["Data Systems","Privacy","Interactive"], date:"2026-07-15", file:"articles/03-zero-copy-context.html" },
  { id:"04-intent-translation-layer", title:"The Intent Engine", summary:"Translating natural human goals into structured execution graphs without rigid manual software inputs.", tags:["UX","State Graphs","Simulation"], date:"2026-07-10", file:"articles/04-intent-translation-layer.html" }
];

let articles = [];
let selectedTag = "ALL";
let openId = null;

const wire = document.getElementById('wire');
const search = document.getElementById('search');
const channels = document.getElementById('channels');

const getRead = () => JSON.parse(localStorage.getItem('wire_read') || '[]');
const markRead = (id) => {
  const read = getRead();
  if(!read.includes(id)){ read.push(id); localStorage.setItem('wire_read', JSON.stringify(read)); }
};

async function init(){
  try{
    const res = await fetch('metadata.json');
    if(!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    articles = data.slice().sort((a,b)=> new Date(b.date) - new Date(a.date));
  }catch(err){
    articles = DEFAULT_ARTICLES.slice().sort((a,b)=> new Date(b.date) - new Date(a.date));
  }
  buildChannels();
  render();
}

function buildChannels(){
  const tagSet = new Set();
  articles.forEach(a => a.tags.forEach(t => tagSet.add(t)));
  tagSet.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'chan-btn';
    btn.dataset.tag = tag;
    btn.textContent = tag;
    btn.addEventListener('click', () => setChannel(tag, btn));
    channels.appendChild(btn);
  });
  channels.querySelector('[data-tag="ALL"]').addEventListener('click', (e) => setChannel('ALL', e.target));
}

function setChannel(tag, btn){
  document.querySelectorAll('.chan-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTag = tag;
  render();
}

function fmtDate(d){
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { month:'short', day:'2-digit' }).toUpperCase();
}

function render(){
  const query = search.value.toLowerCase().trim();
  const read = getRead();

  const filtered = articles.filter(item => {
    const matchesSearch = !query ||
      item.title.toLowerCase().includes(query) ||
      item.summary.toLowerCase().includes(query) ||
      item.tags.some(t => t.toLowerCase().includes(query));
    const matchesTag = selectedTag === "ALL" || item.tags.includes(selectedTag);
    return matchesSearch && matchesTag;
  });

  if(filtered.length === 0){
    wire.innerHTML = `<div class="empty-state">No transmissions match that scan.</div>`;
    return;
  }

  wire.innerHTML = filtered.map((item, i) => {
    const isRead = read.includes(item.id);
    const isOpen = openId === item.id;
    return `
    <div class="entry ${isRead ? 'read' : ''} ${isOpen ? 'open' : ''}" data-id="${item.id}">
      <button class="entry-head" aria-expanded="${isOpen}">
        <span class="idx">${String(i+1).padStart(2,'0')}</span>
        <span class="marker"></span>
        <span class="headline">${item.title}</span>
        <span class="date-stamp">${fmtDate(item.date)}</span>
      </button>
      <div class="entry-body">
        <p class="summary">${item.summary}</p>
        <div class="entry-footer">
          <div class="tags-row">${item.tags.map(t => `<span>${t}</span>`).join('')}</div>
          <a class="run-link" href="${item.file}" data-id="${item.file ? item.id : ''}">
            <span class="pinned-tag">${isRead ? 'read again' : 'run'}</span> →
          </a>
        </div>
      </div>
    </div>`;
  }).join('');

  wire.querySelectorAll('.entry-head').forEach(head => {
    head.addEventListener('click', () => {
      const entry = head.closest('.entry');
      const id = entry.dataset.id;
      openId = (openId === id) ? null : id;
      render();
    });
  });

  wire.querySelectorAll('.run-link').forEach(link => {
    link.addEventListener('click', (e) => {
      const id = e.currentTarget.dataset.id;
      if(id) markRead(id);
    });
  });
}

search.addEventListener('input', render);
init();
</script>
</body>
</html>
